<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>万能工具箱 · 增强版 + 访客信息</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #f1f5f9;
            --card-bg: #ffffff;
            --text: #0f172a;
            --text-light: #475569;
            --border: #e2e8f0;
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --shadow: 0 4px 12px rgba(0,0,0,0.05);
            --radius: 1.2rem;
        }

        body.dark {
            --bg: #0f172a;
            --card-bg: #1e293b;
            --text: #f1f5f9;
            --text-light: #94a3b8;
            --border: #334155;
        }

        body {
            font-family: system-ui, -apple-system, 'Segoe UI', 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            transition: background 0.2s, color 0.2s;
            padding: 1.5rem;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 2rem;
            gap: 1rem;
        }
        .header-left {
            display: flex;
            align-items: center;
            gap: 1rem;
            flex-wrap: wrap;
        }
        h1 {
            font-size: 1.8rem;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }
        .back-home, .theme-btn {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 2rem;
            padding: 0.5rem 1.2rem;
            cursor: pointer;
            font-weight: 500;
            color: var(--text);
            text-decoration: none;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
        }
        .back-home:hover, .theme-btn:hover {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }
        .tools-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
            gap: 1.2rem;
        }
        .tool-card {
            background: var(--card-bg);
            border-radius: var(--radius);
            border: 1px solid var(--border);
            overflow: hidden;
            transition: all 0.2s;
            box-shadow: var(--shadow);
        }
        .tool-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 1.2rem;
            cursor: pointer;
            background: var(--card-bg);
            transition: background 0.15s;
            user-select: none;
        }
        .tool-header:hover {
            background: rgba(59,130,246,0.05);
        }
        .tool-title {
            font-size: 1.2rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.6rem;
        }
        .tool-icon {
            font-size: 1.3rem;
        }
        .expand-icon {
            font-size: 1.2rem;
            transition: transform 0.2s;
            color: var(--text-light);
        }
        .tool-card.expanded .expand-icon {
            transform: rotate(180deg);
        }
        .tool-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease-out;
            padding: 0 1.2rem;
            background: var(--card-bg);
            border-top: none;
        }
        .tool-card.expanded .tool-content {
            max-height: 800px;
            padding: 0 1.2rem 1.2rem 1.2rem;
            border-top: 1px solid var(--border);
        }
        .tool-body {
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
            margin-top: 1rem;
        }
        input, button, select, textarea {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 1rem;
            padding: 0.6rem 0.8rem;
            color: var(--text);
            font-size: 0.9rem;
            outline: none;
            transition: 0.15s;
        }
        input:focus, select:focus, textarea:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 2px rgba(59,130,246,0.2);
        }
        button {
            background: var(--primary);
            color: white;
            border: none;
            cursor: pointer;
            font-weight: 500;
        }
        button:hover {
            background: var(--primary-hover);
            transform: scale(0.98);
        }
        .result {
            background: var(--bg);
            border-radius: 1rem;
            padding: 0.7rem;
            font-size: 0.9rem;
            word-break: break-word;
            border-left: 3px solid var(--primary);
        }
        .flex-row {
            display: flex;
            gap: 0.6rem;
            flex-wrap: wrap;
            align-items: center;
        }
        .calc-buttons {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 0.5rem;
            margin-top: 0.5rem;
        }
        .calc-buttons button {
            padding: 0.6rem 0;
            font-size: 1rem;
        }
        .mode-switch {
            margin-bottom: 0.5rem;
        }
        footer {
            text-align: center;
            margin-top: 3rem;
            color: var(--text-light);
            font-size: 0.8rem;
        }
        .badge {
            font-size: 0.7rem;
            background: var(--primary);
            color: white;
            border-radius: 20px;
            padding: 0.2rem 0.6rem;
            margin-left: 0.5rem;
        }
        .checkbox-group {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            align-items: center;
        }
        .checkbox-group label {
            display: flex;
            align-items: center;
            gap: 0.3rem;
            font-size: 0.85rem;
        }
        @media (max-width: 700px) {
            body { padding: 1rem; }
            .tools-grid { grid-template-columns: 1fr; }
            .calc-buttons { grid-template-columns: repeat(4, 1fr); }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="header-left">
            <a href="index.html" class="back-home">🏠 返回主页</a>
            <h1>🧰 万能工具箱 <span class="badge">增强版 + 访客信息</span></h1>

    <div class="tools-grid" id="toolsGrid"></div>

</div>

    // 工具数据定义

        { id: "textStats", icon: "📝", name: "文字计数器", html: `

            <div class="result" id="textStats">字符数: 0 | 单词数: 0 | 行数: 0</div>

        { id: "colorTool", icon: "🎨", name: "颜色工具", html: `
            <div class="flex-row"><input type="color" id="colorPicker" value="#3b82f6"><span id="colorCode">#3b82f6</span><span id="colorRgb">rgb(59,130,246)</span></div>

            <button id="convertLength">转换</button></div>
            <div class="result" id="lengthResult">结果: </div>

        { id: "markdown", icon: "📄", name: "Markdown 预览", html: `
            <textarea id="mdInput" rows="3" placeholder="# 标题\n**粗体**\n- 列表项"></textarea>

            <button id="rollBtn">🎲 生成随机数</button>
            <div class="result" id="randomResult">结果: -</div>
        `, init: initRandomNum },
        { id: "bmi", icon: "⚖️", name: "BMI 计算器", html: `
            <div class="flex-row"><span>身高</span><input type="number" id="bmiHeight" placeholder="身高" value="170"><select id="bmiHeightUnit"><option value="cm">cm</option><option value="in">in</option></select>
            <span>体重</span><input type="number" id="bmiWeight" placeholder="体重" value="65"><select id="bmiWeightUnit"><option value="kg">kg</option><option value="lb">lb</option></select></div>
            <button id="calcBmi">计算 BMI</button>

        { id: "weight", icon: "⚖️", name: "重量换算", html: `

            <select id="weightFrom"><option value="kg">千克 (kg)</option><option value="g">克 (g)</option><option value="lb">磅 (lb)</option><option value="oz">盎司 (oz)</option><option value="t">吨 (t)</option></select>

            <div class="result" id="weightResult">结果: --</div>

        { id: "base", icon: "🔢", name: "进制转换", html: `
            <div class="flex-row"><input type="text" id="numberInput" placeholder="输入数字" value="FF">
            <select id="inputBase"><option value="2">二进制</option><option value="8">八进制</option><option value="10">十进制</option><option value="16" selected>十六进制</option></select>

        { id: "stopwatch", icon: "⏱️", name: "秒表", html: `

            <div class="flex-row" style="justify-content: center;"><button id="stopwatchStart">开始</button><button id="stopwatchPause">暂停</button><button id="stopwatchReset">复位</button><button id="stopwatchLap">计次</button></div>
            <div class="result" id="stopwatchLaps" style="font-size: 0.8rem; max-height: 100px; overflow-y: auto;">计次记录：</div>
        `, init: initStopwatch },
        { id: "age", icon: "🎂", name: "年龄计算器", html: `
            <label>出生日期：</label><input type="date" id="birthDate" value="2000-01-01">
            <button id="calcAge">计算年龄</button>
            <div class="result" id="ageResult">年龄: --</div>
        `, init: initAge },
        { id: "case", icon: "🔤", name: "文本大小写转换", html: `
            <textarea id="caseInput" rows="2" placeholder="输入文本..."></textarea>
            <div class="flex-row"><button id="toUpper">全部大写</button><button id="toLower">全部小写</button><button id="toTitle">首字母大写</button><button id="toSentence">句子大小写</button><button id="copyCaseResult">📋 复制结果</button></div>
            <div class="result" id="caseOutput">转换结果会显示在这里</div>
        `, init: initCase }
    ];

    // 生成卡片
    const grid = document.getElementById('toolsGrid');
    toolsData.forEach(tool => {
        const card = document.createElement('div');
        card.className = 'tool-card';
        card.id = `tool-${tool.id}`;
        card.innerHTML = `
            <div class="tool-header">
                <div class="tool-title"><span class="tool-icon">${tool.icon}</span> ${tool.name}</div>
                <span class="expand-icon">▼</span>

        grid.appendChild(card);

        header.addEventListener('click', (e) => {

    // ==================== 工具初始化函数 ====================
    function initCalculator() {
        const input = document.getElementById('calcInput');
        const resultDiv = document.getElementById('calcResult');
        const modeSelect = document.getElementById('calcMode');
        const buttonsContainer = document.getElementById('calcButtons');
        
        let currentMode = 'basic';
        const updateButtons = () => {
            const mode = modeSelect.value;
            currentMode = mode;
            let btns = [];
            if (mode === 'basic') {
                btns = ['7','8','9','/','C','4','5','6','*','(', '1','2','3','-',')', '0','.','=','+','⌫'];
            } else {
                btns = ['sin','cos','tan','√','^','7','8','9','/','C','4','5','6','*','(', '1','2','3','-',')', '0','.','=','+','⌫', 'π','e','log','ln','!'];
            }
            buttonsContainer.innerHTML = '';
            btns.forEach(btn => {
                const btnEl = document.createElement('button');
                btnEl.textContent = btn;
                btnEl.onclick = () => handleButton(btn);
                buttonsContainer.appendChild(btnEl);
            });
        };
        
        const handleButton = (btn) => {
            if (btn === 'C') {
                input.value = '';
                resultDiv.innerHTML = '结果: ';
                return;
            }
            if (btn === '⌫') {
                input.value = input.value.slice(0, -1);
                return;
            }
            if (btn === '=') {
                evaluate();
                return;
            }
            if (currentMode === 'sci') {
                if (btn === 'sin') input.value += 'sin(';
                else if (btn === 'cos') input.value += 'cos(';
                else if (btn === 'tan') input.value += 'tan(';
                else if (btn === '√') input.value += 'sqrt(';
                else if (btn === '^') input.value += '^';
                else if (btn === 'π') input.value += 'PI';
                else if (btn === 'e') input.value += 'E';
                else if (btn === 'log') input.value += 'log10(';
                else if (btn === 'ln') input.value += 'ln(';
                else if (btn === '!') input.value += '!';
                else input.value += btn;
            } else {
                input.value += btn;
            }
        };
        
        const evaluate = () => {
            let expr = input.value;
            if (expr === '') { resultDiv.innerHTML = '结果: 请输入表达式'; return; }
            try {
                expr = expr.replace(/sin\(/g, 'Math.sin(');
                expr = expr.replace(/cos\(/g, 'Math.cos(');
                expr = expr.replace(/tan\(/g, 'Math.tan(');
                expr = expr.replace(/sqrt\(/g, 'Math.sqrt(');
                expr = expr.replace(/log10\(/g, 'Math.log10(');
                expr = expr.replace(/ln\(/g, 'Math.log(');
                expr = expr.replace(/\^/g, '**');
                expr = expr.replace(/PI/g, 'Math.PI');
                expr = expr.replace(/E/g, 'Math.E');
                expr = expr.replace(/(\d+)!/g, (_, n) => {
                    let num = parseInt(n);
                    let res = 1;
                    for (let i=2; i<=num; i++) res *= i;
                    return res;
                });
                const result = Function('"use strict";return (' + expr + ')')();
                resultDiv.innerHTML = `结果: ${result}`;
            } catch(e) {
                resultDiv.innerHTML = '结果: 表达式错误';
            }
        };
        
        modeSelect.addEventListener('change', updateButtons);
        updateButtons();
        
        document.getElementById('calcBtn').onclick = evaluate;
        document.getElementById('clearCalc').onclick = () => { input.value = ''; resultDiv.innerHTML = '结果: '; };
        document.getElementById('backspaceCalc').onclick = () => { input.value = input.value.slice(0, -1); };
        input.addEventListener('keypress', (e) => { if (e.key === 'Enter') evaluate(); });
    }
    
    function initPassword() {
        const genBtn = document.getElementById('genPassword');
        const copyBtn = document.getElementById('copyPassword');
        const resultSpan = document.getElementById('passwordResult');
        const generate = () => {
            const len = parseInt(document.getElementById('pwdLength').value) || 12;
            const upper = document.getElementById('pwdUpper').checked;
            const lower = document.getElementById('pwdLower').checked;
            const digits = document.getElementById('pwdDigits').checked;
            const symbols = document.getElementById('pwdSymbols').checked;
            let chars = '';
            if (upper) chars += 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
            if (lower) chars += 'abcdefghijklmnopqrstuvwxyz';
            if (digits) chars += '0123456789';
            if (symbols) chars += '!@#$%^&*()_+[]{}<>?';
            if (chars === '') { resultSpan.innerText = '请至少选择一种字符类型'; return; }
            let pwd = '';
            for (let i=0; i<len; i++) pwd += chars[Math.floor(Math.random() * chars.length)];
            resultSpan.innerText = pwd;
        };
        genBtn.onclick = generate;
        copyBtn.onclick = () => {
            const pwd = resultSpan.innerText;
            if (pwd && pwd !== '请至少选择一种字符类型') {
                navigator.clipboard.writeText(pwd);
                alert('密码已复制到剪贴板');
            }
        };
        generate();
    }
    
    function initVisitorInfo() {
        const infoDiv = document.getElementById('visitorInfoContent');
        if (!infoDiv) return;
        
        async function fetchAndDisplay() {
            try {
                const response = await fetch('https://ipapi.co/json/');
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                const data = await response.json();
                
                if (data && data.ip) {
                    const fullIp = data.ip;
                    let partialIp = '';
                    if (fullIp.includes('.')) {
                        const parts = fullIp.split('.');
                        partialIp = `${parts[0]}.${parts[1]}.***.***`;
                    } else if (fullIp.includes(':')) {
                        const parts = fullIp.split(':');
                        partialIp = parts.slice(0,2).join(':') + ':****:****:****:****';
                    } else {
                        partialIp = fullIp;
                    }
                    
                    const city = data.city || '未知城市';
                    const region = data.region || '未知地区';
                    const country = data.country_name || '未知国家';
                    const isp = data.org || '未知运营商';
                    const timezone = data.timezone || '未知时区';
                    
                    infoDiv.innerHTML = `
                        <div>📡 <strong>部分 IP</strong>：${partialIp}</div>
                        <div>📍 <strong>推断位置</strong>：${city}, ${region}, ${country}</div>
                        <div>🏢 <strong>网络运营商</strong>：${isp}</div>
                        <div>⏰ <strong>时区</strong>：${timezone}</div>
                        <div style="font-size: 0.75rem; margin-top: 6px;">ℹ️ 数据来自 ipapi.co，仅作展示，未经存储。</div>
                    `;
                } else {
                    infoDiv.innerHTML = '⚠️ 未能获取访问信息，请稍后重试。';
                }
            } catch (error) {
                console.error('访客信息获取失败:', error);
                infoDiv.innerHTML = '⚠️ 获取失败，可能是网络问题或 API 限制。请刷新页面试试。';
            }
        }
        
        fetchAndDisplay();
    }
    
    function initTodo() {
        let todos = JSON.parse(localStorage.getItem('todosTools')) || [];
        function renderTodos() {
            const listUl = document.getElementById('todoList');
            if (!listUl) return;
            listUl.innerHTML = '';
            todos.forEach((todo, idx) => {
                const li = document.createElement('li');
                li.style.display = 'flex';
                li.style.justifyContent = 'space-between';
                li.style.alignItems = 'center';
                li.style.marginBottom = '0.5rem';
                li.style.background = 'var(--bg)';
                li.style.padding = '0.3rem 0.6rem';
                li.style.borderRadius = '12px';
                const span = document.createElement('span');
                span.textContent = todo;
                const delBtn = document.createElement('button');
                delBtn.textContent = '❌';
                delBtn.style.background = 'transparent';
                delBtn.style.color = 'var(--text-light)';
                delBtn.style.padding = '0 0.3rem';
                delBtn.onclick = () => {
                    todos.splice(idx, 1);
                    localStorage.setItem('todosTools', JSON.stringify(todos));
                    renderTodos();
                };
                li.appendChild(span);
                li.appendChild(delBtn);
                listUl.appendChild(li);
            });
        }
        const addBtn = document.getElementById('addTodoBtn');
        if (addBtn) addBtn.onclick = () => {
            const input = document.getElementById('todoInput');
            const val = input.value.trim();
            if (val) {
                todos.push(val);
                localStorage.setItem('todosTools', JSON.stringify(todos));
                renderTodos();
                input.value = '';
            }
        };
        renderTodos();
    }
    
    function initTemp() {
        const btn = document.getElementById('convertTemp');
        if (btn) btn.onclick = () => {
            let val = parseFloat(document.getElementById('tempInput').value);
            if (isNaN(val)) val = 0;
            const from = document.getElementById('tempFrom').value;
            const to = document.getElementById('tempTo').value;
            let celsius = (from === 'C') ? val : (val - 32) * 5/9;
            let result = (to === 'C') ? celsius : celsius * 9/5 + 32;
            document.getElementById('tempResult').innerHTML = `结果: ${result.toFixed(2)} °${to === 'C' ? 'C' : 'F'}`;
        };
        btn?.click();
    }
    
    function initQuote() {
        const quotes = {
            all: ["代码改变世界，一行一行。","简单是可靠的先决条件。","保持好奇，持续创造。","GitHub Pages 让每个人拥有网站。","今日事，今日毕。","设计不只是看起来怎样，还在于如何工作。","与其等待机会，不如创造机会。","不要害怕犯错，害怕停下。","万物皆可自动化。","Less is more.","Talk is cheap. Show me the code."],
            code: ["Talk is cheap. Show me the code.","保持简单，保持愚蠢。","先运行，再优化。","任何足够先进的技术都与魔法无异。","编程是思考，不是打字。"],
            life: ["活在当下。","简单的幸福。","坚持不懈，直到成功。","每天进步一点点。","微笑面对生活。"]
        };
        const btn = document.getElementById('newQuoteBtn');
        const category = document.getElementById('quoteCategory');
        if (btn) btn.onclick = () => {
            const cat = category.value;
            const list = quotes[cat] || quotes.all;
            const idx = Math.floor(Math.random() * list.length);
            document.getElementById('quoteText').innerText = `“${list[idx]}”`;
        };
        btn?.click();
    }
    
    function initCounter() {
        let visits = parseInt(localStorage.getItem('visitCountTools')) || 0;
        visits++;
        localStorage.setItem('visitCountTools', visits);
        const visitSpan = document.getElementById('visitCount');
        if (visitSpan) visitSpan.innerText = `本设备访问次数: ${visits}`;
        const resetBtn = document.getElementById('resetCountBtn');
        if (resetBtn) resetBtn.onclick = () => {
            localStorage.setItem('visitCountTools', 0);
            if (visitSpan) visitSpan.innerText = '本设备访问次数: 0';
        };
    }
    
    function initCountdown() {
        let interval = null;
        let remaining = 0;
        const display = document.getElementById('countdownDisplay');
        const start = () => {
            if (interval) clearInterval(interval);
            remaining = parseInt(document.getElementById('countdownSeconds').value);
            if (isNaN(remaining) || remaining <= 0) { if (display) display.innerText = '请设置正数秒数'; return; }
            if (display) display.innerText = `剩余: ${remaining} 秒`;
            interval = setInterval(() => {
                if (remaining <= 1) { clearInterval(interval); interval = null; if (display) display.innerText = '⏰ 时间到!'; }
                else { remaining--; if (display) display.innerText = `剩余: ${remaining} 秒`; }
            }, 1000);
        };
        const pause = () => { if (interval) clearInterval(interval); interval = null; };
        const resume = () => {
            if (interval) return;
            if (remaining <= 0) return;
            interval = setInterval(() => {
                if (remaining <= 1) { clearInterval(interval); interval = null; if (display) display.innerText = '⏰ 时间到!'; }
                else { remaining--; if (display) display.innerText = `剩余: ${remaining} 秒`; }
            }, 1000);
        };
        const stop = () => { if (interval) clearInterval(interval); interval = null; if (display) display.innerText = '剩余: 0 秒'; remaining = 0; };
        const startBtn = document.getElementById('startCountdown');
        const pauseBtn = document.getElementById('pauseCountdown');
        const resumeBtn = document.getElementById('resumeCountdown');
        const stopBtn = document.getElementById('stopCountdown');
        if (startBtn) startBtn.onclick = start;
        if (pauseBtn) pauseBtn.onclick = pause;
        if (resumeBtn) resumeBtn.onclick = resume;
        if (stopBtn) stopBtn.onclick = stop;
    }
    
    function initTextStats() {
        const textarea = document.getElementById('textCounterInput');
        const update = () => {
            const text = textarea.value;
            const charCount = text.length;
            const wordCount = text.trim() === '' ? 0 : text.trim().split(/\s+/).length;
            const lineCount = text === '' ? 0 : text.split(/\n/).length;
            document.getElementById('textStats').innerText = `字符数: ${charCount} | 单词数: ${wordCount} | 行数: ${lineCount}`;
        };
        if (textarea) textarea.oninput = update;
        update();
    }
    
    function initColorTool() {
        const picker = document.getElementById('colorPicker');
        const codeSpan = document.getElementById('colorCode');
        const rgbSpan = document.getElementById('colorRgb');
        const demo = document.getElementById('colorDemo');
        const updateColor = (color) => {
            demo.style.background = color;
            codeSpan.innerText = color;
            let r = parseInt(color.slice(1,3),16);
            let g = parseInt(color.slice(3,5),16);
            let b = parseInt(color.slice(5,7),16);
            rgbSpan.innerText = `rgb(${r},${g},${b})`;
        };
        if (picker) picker.oninput = (e) => updateColor(e.target.value);
        const randomBtn = document.getElementById('randomColorBtn');
        if (randomBtn) randomBtn.onclick = () => {
            const randomHex = '#' + Math.floor(Math.random()*16777215).toString(16).padStart(6,'0');
            picker.value = randomHex;
            updateColor(randomHex);
        };
        if (picker) updateColor(picker.value);
    }
    
    function initLength() {
        const lengthMap = { m:1, ft:3.28084, cm:100, in:39.3701, km:0.001, mi:0.000621371 };
        const btn = document.getElementById('convertLength');
        if (btn) btn.onclick = () => {
            let val = parseFloat(document.getElementById('lengthVal').value) || 0;
            const from = document.getElementById('lengthFrom').value;
            const to = document.getElementById('lengthTo').value;
            const meters = val / lengthMap[from];
            const result = meters * lengthMap[to];
            document.getElementById('lengthResult').innerText = `结果: ${result.toFixed(6)} ${to}`;
        };
        btn?.click();
    }
    
    function initMarkdown() {
        const mdArea = document.getElementById('mdInput');
        const preview = document.getElementById('mdPreview');
        const update = () => { if (typeof marked !== 'undefined') preview.innerHTML = marked.parse(mdArea.value); else preview.innerText = '加载 marked 库中...'; };
        if (mdArea) mdArea.oninput = update;
        if (mdArea) mdArea.value = "# 欢迎\n**实时预览**\n- 列表1\n- 列表2";
        update();
    }
    
    function initRandomNum() {
        const btn = document.getElementById('rollBtn');
        if (btn) btn.onclick = () => {
            let min = parseInt(document.getElementById('randMin').value) || 1;
            let max = parseInt(document.getElementById('randMax').value) || 100;
            if(min > max) [min,max] = [max,min];
            const rand = Math.floor(Math.random() * (max - min + 1) + min);
            document.getElementById('randomResult').innerText = `结果: ${rand}`;
        };
        btn?.click();
    }
    
    function initBMI() {
        const btn = document.getElementById('calcBmi');
        if (btn) btn.onclick = () => {
            let h = parseFloat(document.getElementById('bmiHeight').value);
            let hUnit = document.getElementById('bmiHeightUnit').value;
            let w = parseFloat(document.getElementById('bmiWeight').value);
            let wUnit = document.getElementById('bmiWeightUnit').value;
            if (isNaN(h) || isNaN(w) || h<=0 || w<=0) { document.getElementById('bmiResult').innerText = '请输入有效数值'; return; }
            if (hUnit === 'in') h = h * 2.54;
            if (wUnit === 'lb') w = w * 0.453592;
            let bmi = w / ((h/100)*(h/100));
            let advice = bmi < 18.5 ? '体重过轻' : (bmi < 24 ? '正常' : (bmi < 28 ? '超重' : '肥胖'));
            document.getElementById('bmiResult').innerHTML = `BMI: ${bmi.toFixed(2)} (${advice})`;
        };
    }
    
    function initWeight() {
        const weightToKg = { kg:1, g:0.001, lb:0.453592, oz:0.0283495, t:1000 };
        const btn = document.getElementById('convertWeight');
        if (btn) btn.onclick = () => {
            let val = parseFloat(document.getElementById('weightValue').value) || 0;
            const from = document.getElementById('weightFrom').value;
            const to = document.getElementById('weightTo').value;
            const kg = val * weightToKg[from];
            const result = kg / weightToKg[to];
            document.getElementById('weightResult').innerText = `结果: ${result.toFixed(6)} ${to}`;
        };
    }
    
    function initBase() {
        const btn = document.getElementById('convertBase');
        if (btn) btn.onclick = () => {
            let num = document.getElementById('numberInput').value.trim();
            let fromBase = parseInt(document.getElementById('inputBase').value);
            let toBase = parseInt(document.getElementById('outputBase').value);
            try {
                let decimal = parseInt(num, fromBase);
                if (isNaN(decimal)) throw new Error();
                document.getElementById('baseResult').innerText = `结果: ${decimal.toString(toBase).toUpperCase()}`;
            } catch(e) { document.getElementById('baseResult').innerText = '转换错误，请检查输入格式'; }
        };
    }
    
    function initStopwatch() {
        let swInterval = null, swTime = 0;
        const display = document.getElementById('stopwatchDisplay');
        const lapsDiv = document.getElementById('stopwatchLaps');
        let lapCount = 1;
        const update = () => { let m = Math.floor(swTime/6000), s = Math.floor((swTime%6000)/100), cs = swTime%100; if (display) display.innerText = `${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}.${cs.toString().padStart(2,'0')}`; };
        const start = () => { if(swInterval) return; swInterval = setInterval(() => { swTime++; update(); }, 10); };
        const pause = () => { if(swInterval) clearInterval(swInterval); swInterval = null; };
        const reset = () => { if(swInterval) clearInterval(swInterval); swInterval = null; swTime = 0; update(); if (lapsDiv) lapsDiv.innerHTML = '计次记录：'; lapCount = 1; };
        const lap = () => {
            if (swTime === 0 && (!lapsDiv || lapsDiv.innerHTML === '计次记录：')) return;
            const current = display.innerText;
            const lapItem = document.createElement('div');
            lapItem.textContent = `计次 ${lapCount++}: ${current}`;
            if (lapsDiv) lapsDiv.appendChild(lapItem);
        };
        const startBtn = document.getElementById('stopwatchStart');
        const pauseBtn = document.getElementById('stopwatchPause');
        const resetBtn = document.getElementById('stopwatchReset');
        const lapBtn = document.getElementById('stopwatchLap');
        if (startBtn) startBtn.onclick = start;
        if (pauseBtn) pauseBtn.onclick = pause;
        if (resetBtn) resetBtn.onclick = reset;
        if (lapBtn) lapBtn.onclick = lap;
        update();
    }
    
    function initAge() {
        const btn = document.getElementById('calcAge');
        if (btn) btn.onclick = () => {
            let birth = new Date(document.getElementById('birthDate').value);
            let today = new Date();
            if (isNaN(birth.getTime())) { document.getElementById('ageResult').innerText = '请选择有效日期'; return; }
            let years = today.getFullYear() - birth.getFullYear();
            let months = today.getMonth() - birth.getMonth();
            let days = today.getDate() - birth.getDate();
            if (days < 0) { months--; let prevMonth = new Date(today.getFullYear(), today.getMonth(), 0); days += prevMonth.getDate(); }
            if (months < 0) { years--; months += 12; }
            document.getElementById('ageResult').innerHTML = `年龄: ${years} 岁 ${months} 月 ${days} 天`;
        };
    }
    
    function initCase() {
        const input = document.getElementById('caseInput');
        const output = document.getElementById('caseOutput');
        const apply = (fn) => { if (output) output.innerText = fn(input.value); };
        const upperBtn = document.getElementById('toUpper');
        const lowerBtn = document.getElementById('toLower');
        const titleBtn = document.getElementById('toTitle');
        const sentenceBtn = document.getElementById('toSentence');
        const copyBtn = document.getElementById('copyCaseResult');
        if (upperBtn) upperBtn.onclick = () => apply(s => s.toUpperCase());
        if (lowerBtn) lowerBtn.onclick = () => apply(s => s.toLowerCase());
        if (titleBtn) titleBtn.onclick = () => apply(s => s.replace(/\b\w/g, c => c.toUpperCase()));
        if (sentenceBtn) sentenceBtn.onclick = () => apply(s => s.charAt(0).toUpperCase() + s.slice(1).toLowerCase());
        if (copyBtn) copyBtn.onclick = () => {
            if (output && output.innerText && output.innerText !== '转换结果会显示在这里') {
                navigator.clipboard.writeText(output.innerText);
                alert('已复制转换结果');
            }
        };
    }
    
    // 执行所有初始化
    initCalculator();
    initPassword();
    initVisitorInfo();
    initTodo();
    initTemp();
    initQuote();
    initCounter();
    initCountdown();
    initTextStats();
    initColorTool();
    initLength();
    initMarkdown();
    initRandomNum();
    initBMI();
    initWeight();
    initBase();
    initStopwatch();
    initAge();
    initCase();
    
    // 深色模式
    const themeBtn = document.getElementById('themeToggle');
    const rootBody = document.body;
    if (localStorage.getItem('toolsTheme') === 'dark') {
        rootBody.classList.add('dark');
        themeBtn.innerText = '☀️ 浅色模式';
    }
    themeBtn.addEventListener('click', () => {
        rootBody.classList.toggle('dark');
        const isDark = rootBody.classList.contains('dark');
        localStorage.setItem('toolsTheme', isDark ? 'dark' : 'light');
        themeBtn.innerText = isDark ? '☀️ 浅色模式' : '🌙 深色模式';
    });
</script>
