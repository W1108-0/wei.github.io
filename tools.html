<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>万能工具箱 · 完整增强版</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #f1f5f9;
            --card-bg: #ffffff;
            --text: #0f172a;
            --text-light: #475569;
            --border: #e2e8f0;
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --shadow: 0 4px 12px rgba(0,0,0,0.05);
            --radius: 1.2rem;
        }

        body.dark {
            --bg: #0f172a;
            --card-bg: #1e293b;
            --text: #f1f5f9;
            --text-light: #94a3b8;
            --border: #334155;
        }

        body {
            font-family: system-ui, -apple-system, 'Segoe UI', 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            transition: background 0.2s, color 0.2s;
            padding: 1.5rem;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 2rem;
            gap: 1rem;
        }
        .header-left {
            display: flex;
            align-items: center;
            gap: 1rem;
            flex-wrap: wrap;
        }
        h1 {
            font-size: 1.8rem;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }
        .back-home, .theme-btn {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 2rem;
            padding: 0.5rem 1.2rem;
            cursor: pointer;
            font-weight: 500;
            color: var(--text);
            text-decoration: none;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
        }
        .back-home:hover, .theme-btn:hover {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }
        .tools-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
            gap: 1.2rem;
        }
        .tool-card {
            background: var(--card-bg);
            border-radius: var(--radius);
            border: 1px solid var(--border);
            overflow: hidden;
            transition: all 0.2s;
            box-shadow: var(--shadow);
        }
        .tool-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 1.2rem;
            cursor: pointer;
            background: var(--card-bg);
            transition: background 0.15s;
            user-select: none;
        }
        .tool-header:hover {
            background: rgba(59,130,246,0.05);
        }
        .tool-title {
            font-size: 1.2rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.6rem;
        }
        .tool-icon {
            font-size: 1.3rem;
        }
        .expand-icon {
            font-size: 1.2rem;
            transition: transform 0.2s;
            color: var(--text-light);
        }
        .tool-card.expanded .expand-icon {
            transform: rotate(180deg);
        }
        .tool-content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.3s ease-out;
            padding: 0 1.2rem;
            background: var(--card-bg);
            border-top: none;
        }
        .tool-card.expanded .tool-content {
            max-height: 800px;
            padding: 0 1.2rem 1.2rem 1.2rem;
            border-top: 1px solid var(--border);
        }
        .tool-body {
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
            margin-top: 1rem;
        }
        input, button, select, textarea {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 1rem;
            padding: 0.6rem 0.8rem;
            color: var(--text);
            font-size: 0.9rem;
            outline: none;
            transition: 0.15s;
        }
        input:focus, select:focus, textarea:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 2px rgba(59,130,246,0.2);
        }
        button {
            background: var(--primary);
            color: white;
            border: none;
            cursor: pointer;
            font-weight: 500;
        }
        button:hover {
            background: var(--primary-hover);
            transform: scale(0.98);
        }
        .result {
            background: var(--bg);
            border-radius: 1rem;
            padding: 0.7rem;
            font-size: 0.9rem;
            word-break: break-word;
            border-left: 3px solid var(--primary);
        }
        .flex-row {
            display: flex;
            gap: 0.6rem;
            flex-wrap: wrap;
            align-items: center;
        }
        .calc-buttons {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 0.5rem;
            margin-top: 0.5rem;
        }
        .calc-buttons button {
            padding: 0.6rem 0;
            font-size: 1rem;
        }
        .mode-switch {
            margin-bottom: 0.5rem;
        }
        footer {
            text-align: center;
            margin-top: 3rem;
            color: var(--text-light);
            font-size: 0.8rem;
        }
        .badge {
            font-size: 0.7rem;
            background: var(--primary);
            color: white;
            border-radius: 20px;
            padding: 0.2rem 0.6rem;
            margin-left: 0.5rem;
        }
        .checkbox-group {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            align-items: center;
        }
        .checkbox-group label {
            display: flex;
            align-items: center;
            gap: 0.3rem;
            font-size: 0.85rem;
        }
        @media (max-width: 700px) {
            body { padding: 1rem; }
            .tools-grid { grid-template-columns: 1fr; }
            .calc-buttons { grid-template-columns: repeat(4, 1fr); }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="header-left">
            <a href="index.html" class="back-home">🏠 返回主页</a>
            <h1>🧰 万能工具箱 <span class="badge">25合1 · 增强访客信息</span></h1>
        </div>
        <button class="theme-btn" id="themeToggle">🌙 深色模式</button>
    </div>
    <div class="tools-grid" id="toolsGrid"></div>
    <footer>⚡ 点击任意工具标题展开 | 所有工具本地运行 | “我的访问信息”仅展示，不存储任何数据 | 支持手动刷新</footer>
</div>

<script>
    // 工具数据定义 (共25个)
    const toolsData = [
        // 原有核心工具
        { id: "calculator", icon: "📱", name: "增强计算器", html: `
            <div class="mode-switch flex-row"><span>模式：</span>
                <select id="calcMode"><option value="basic">标准模式</option><option value="sci">科学模式</option></select>
            </div>
            <input type="text" id="calcInput" placeholder="0" value="">
            <div class="calc-buttons" id="calcButtons"></div>
            <div class="flex-row"><button id="calcBtn">= 计算</button><button id="clearCalc">C 清空</button><button id="backspaceCalc">⌫ 退格</button></div>
            <div class="result" id="calcResult">结果: </div>
        `, init: initCalculator },
        { id: "password", icon: "🔐", name: "高级密码生成", html: `
            <div class="checkbox-group">
                <label><input type="checkbox" id="pwdUpper" checked> 大写 (A-Z)</label>
                <label><input type="checkbox" id="pwdLower" checked> 小写 (a-z)</label>
                <label><input type="checkbox" id="pwdDigits" checked> 数字 (0-9)</label>
                <label><input type="checkbox" id="pwdSymbols" checked> 符号 (!@#$%^&*)</label>
            </div>
            <div class="flex-row"><span>长度：</span><input type="number" id="pwdLength" value="12" min="4" max="32"><button id="genPassword">生成密码</button><button id="copyPassword">📋 复制</button></div>
            <div class="result" id="passwordResult">点击生成</div>
        `, init: initPassword },
        // 增强的访客信息卡片
        { id: "visitor", icon: "🌍", name: "我的访问信息", html: `
            <div id="visitorInfoContainer">
                <div class="result" id="visitorInfoContent" style="min-height: 120px;">正在获取你的网络信息...</div>
                <div style="display: flex; justify-content: flex-end; margin-top: 6px;">
                    <button id="refreshVisitorInfo" style="background: var(--primary); padding: 0.3rem 0.8rem; font-size: 0.8rem;">🔄 刷新信息</button>
                </div>
                <div style="font-size: 0.7rem; color: var(--text-light); margin-top: 0.5rem;">🔒 数据仅展示在你的浏览器中，不会被保存或收集。IP 地址仅显示部分，完整信息来自第三方 API。</div>
            </div>
        `, init: initVisitorInfo },
        { id: "todo", icon: "✓", name: "待办清单", html: `
            <div class="flex-row"><input type="text" id="todoInput" placeholder="写一个任务..."><button id="addTodoBtn">➕ 添加</button></div>
            <ul id="todoList" style="list-style: none; max-height: 180px; overflow-y: auto; padding-left: 0;"></ul>
        `, init: initTodo },
        { id: "temperature", icon: "🌡️", name: "温度转换", html: `
            <div class="flex-row"><input type="number" id="tempInput" placeholder="数值" value="25">
            <select id="tempFrom"><option value="C">摄氏度 °C</option><option value="F">华氏度 °F</option></select>
            <span>→</span><select id="tempTo"><option value="F">华氏度 °F</option><option value="C">摄氏度 °C</option></select>
            <button id="convertTemp">转换</button></div>
            <div class="result" id="tempResult">结果: 77 °F</div>
        `, init: initTemp },
        { id: "quote", icon: "📜", name: "随机名言", html: `
            <div class="flex-row"><select id="quoteCategory"><option value="all">全部</option><option value="code">编程</option><option value="life">人生</option></select><button id="newQuoteBtn">✨ 随机一句</button></div>
            <div class="result" id="quoteText" style="min-height: 70px;">点击按钮生成一句名言</div>
        `, init: initQuote },
        { id: "counter", icon: "👀", name: "访问计数器", html: `
            <div class="result" id="visitCount">本设备访问次数: --</div>
            <button id="resetCountBtn">重置计数器</button>
        `, init: initCounter },
        { id: "countdown", icon: "⏳", name: "倒计时器", html: `
            <div class="flex-row"><input type="number" id="countdownSeconds" placeholder="秒数" value="60"><button id="startCountdown">开始</button><button id="pauseCountdown">暂停</button><button id="resumeCountdown">继续</button><button id="stopCountdown">停止</button></div>
            <div class="result" id="countdownDisplay">剩余: 0 秒</div>
        `, init: initCountdown },
        { id: "textStats", icon: "📝", name: "文字计数器", html: `
            <textarea id="textCounterInput" rows="3" placeholder="输入一些文字..."></textarea>
            <div class="result" id="textStats">字符数: 0 | 单词数: 0 | 行数: 0</div>
        `, init: initTextStats },
        { id: "colorTool", icon: "🎨", name: "颜色工具", html: `
            <div class="flex-row"><input type="color" id="colorPicker" value="#3b82f6"><span id="colorCode">#3b82f6</span><span id="colorRgb">rgb(59,130,246)</span></div>
            <button id="randomColorBtn">🎲 随机颜色</button>
            <div class="result" id="colorDemo" style="height: 50px; background: #3b82f6; border-radius: 12px;"></div>
        `, init: initColorTool },
        { id: "length", icon: "📏", name: "长度转换", html: `
            <div class="flex-row"><input type="number" id="lengthVal" placeholder="数值" value="1">
            <select id="lengthFrom"><option value="m">米(m)</option><option value="ft">英尺(ft)</option><option value="cm">厘米(cm)</option><option value="in">英寸(in)</option><option value="km">千米(km)</option><option value="mi">英里(mi)</option></select>
            <span>→</span><select id="lengthTo"><option value="ft">英尺(ft)</option><option value="m">米(m)</option><option value="cm">厘米(cm)</option><option value="in">英寸(in)</option><option value="km">千米(km)</option><option value="mi">英里(mi)</option></select>
            <button id="convertLength">转换</button></div>
            <div class="result" id="lengthResult">结果: </div>
        `, init: initLength },
        { id: "markdown", icon: "📄", name: "Markdown 预览", html: `
            <textarea id="mdInput" rows="3" placeholder="# 标题\n**粗体**\n- 列表项"></textarea>
            <div class="result" id="mdPreview" style="min-height: 100px;"></div>
        `, init: initMarkdown },
        { id: "randomNum", icon: "🎲", name: "随机数生成", html: `
            <div class="flex-row"><span>最小值</span><input type="number" id="randMin" value="1"><span>最大值</span><input type="number" id="randMax" value="100"></div>
            <button id="rollBtn">🎲 生成随机数</button>
            <div class="result" id="randomResult">结果: -</div>
        `, init: initRandomNum },
        { id: "bmi", icon: "⚖️", name: "BMI 计算器", html: `
            <div class="flex-row"><span>身高</span><input type="number" id="bmiHeight" placeholder="身高" value="170"><select id="bmiHeightUnit"><option value="cm">cm</option><option value="in">in</option></select>
            <span>体重</span><input type="number" id="bmiWeight" placeholder="体重" value="65"><select id="bmiWeightUnit"><option value="kg">kg</option><option value="lb">lb</option></select></div>
            <button id="calcBmi">计算 BMI</button>
            <div class="result" id="bmiResult">BMI: --</div>
        `, init: initBMI },
        { id: "weight", icon: "⚖️", name: "重量换算", html: `
            <div class="flex-row"><input type="number" id="weightValue" placeholder="数值" value="1">
            <select id="weightFrom"><option value="kg">千克 (kg)</option><option value="g">克 (g)</option><option value="lb">磅 (lb)</option><option value="oz">盎司 (oz)</option><option value="t">吨 (t)</option></select>
            <span>→</span><select id="weightTo"><option value="lb">磅 (lb)</option><option value="kg">千克 (kg)</option><option value="g">克 (g)</option><option value="oz">盎司 (oz)</option><option value="t">吨 (t)</option></select>
            <button id="convertWeight">转换</button></div>
            <div class="result" id="weightResult">结果: --</div>
        `, init: initWeight },
        { id: "base", icon: "🔢", name: "进制转换", html: `
            <div class="flex-row"><input type="text" id="numberInput" placeholder="输入数字" value="FF">
            <select id="inputBase"><option value="2">二进制</option><option value="8">八进制</option><option value="10">十进制</option><option value="16" selected>十六进制</option></select>
            <span>→</span><select id="outputBase"><option value="10" selected>十进制</option><option value="2">二进制</option><option value="8">八进制</option><option value="16">十六进制</option></select>
            <button id="convertBase">转换</button></div>
            <div class="result" id="baseResult">结果: --</div>
        `, init: initBase },
        { id: "stopwatch", icon: "⏱️", name: "秒表", html: `
            <div class="result" id="stopwatchDisplay" style="font-size: 1.8rem; text-align: center; font-family: monospace;">00:00.00</div>
            <div class="flex-row" style="justify-content: center;"><button id="stopwatchStart">开始</button><button id="stopwatchPause">暂停</button><button id="stopwatchReset">复位</button><button id="stopwatchLap">计次</button></div>
            <div class="result" id="stopwatchLaps" style="font-size: 0.8rem; max-height: 100px; overflow-y: auto;">计次记录：</div>
        `, init: initStopwatch },
        { id: "age", icon: "🎂", name: "年龄计算器", html: `
            <label>出生日期：</label><input type="date" id="birthDate" value="2000-01-01">
            <button id="calcAge">计算年龄</button>
            <div class="result" id="ageResult">年龄: --</div>
        `, init: initAge },
        { id: "case", icon: "🔤", name: "文本大小写转换", html: `
            <textarea id="caseInput" rows="2" placeholder="输入文本..."></textarea>
            <div class="flex-row"><button id="toUpper">全部大写</button><button id="toLower">全部小写</button><button id="toTitle">首字母大写</button><button id="toSentence">句子大小写</button><button id="copyCaseResult">📋 复制结果</button></div>
            <div class="result" id="caseOutput">转换结果会显示在这里</div>
        `, init: initCase },
        // 实用工具类（6个）
        { id: "unitConverter", icon: "📐", name: "综合单位换算", html: `
            <div class="flex-row"><input type="number" id="unitValue" placeholder="数值" value="1"><select id="unitCategory"><option value="area">面积</option><option value="volume">体积</option><option value="speed">速度</option></select></div>
            <div class="flex-row"><select id="unitFrom"></select><span>→</span><select id="unitTo"></select><button id="convertUnit">转换</button></div>
            <div class="result" id="unitResult">结果: --</div>
        `, init: initUnitConverter },
        { id: "mortgage", icon: "🏠", name: "房贷计算器", html: `
            <div class="flex-row"><span>贷款总额 (万元)</span><input type="number" id="loanAmount" value="100" step="10"></div>
            <div class="flex-row"><span>年利率 (%)</span><input type="number" id="loanRate" value="4.9" step="0.1"></div>
            <div class="flex-row"><span>贷款年限 (年)</span><input type="number" id="loanYears" value="30"></div>
            <div class="flex-row"><span>还款方式</span><select id="repaymentMethod"><option value="equalPrincipal">等额本金</option><option value="equalInstallment">等额本息</option></select><button id="calcMortgage">计算</button></div>
            <div class="result" id="mortgageResult">月供: -- 元<br>总利息: -- 万元<br>还款总额: -- 万元</div>
        `, init: initMortgage },
        { id: "dateCalc", icon: "📅", name: "日期计算器", html: `
            <div class="flex-row"><span>开始日期</span><input type="date" id="dateStart" value="2025-01-01"></div>
            <div class="flex-row"><span>结束日期</span><input type="date" id="dateEnd" value="2025-12-31"></div>
            <div class="checkbox-group"><label><input type="checkbox" id="excludeWeekends"> 排除周末（周六日）</label></div>
            <button id="calcDateDiff">计算差值</button>
            <div class="result" id="dateResult">相差 -- 天 (约 -- 周)</div>
        `, init: initDateCalc },
        { id: "jsonTool", icon: "{}", name: "JSON 格式化/校验", html: `
            <textarea id="jsonInput" rows="4" placeholder='{"name":"张三","age":30}'></textarea>
            <div class="flex-row"><button id="formatJson">格式化</button><button id="validateJson">校验</button><button id="minifyJson">压缩</button></div>
            <div class="result" id="jsonResult">等待操作</div>
        `, init: initJsonTool },
        { id: "base64", icon: "🔡", name: "Base64 编解码", html: `
            <textarea id="base64Input" rows="3" placeholder="输入文本或Base64..."></textarea>
            <div class="flex-row"><button id="encodeBase64">编码为 Base64</button><button id="decodeBase64">解码为文本</button></div>
            <div class="result" id="base64Result">结果将显示在这里</div>
        `, init: initBase64Tool },
        { id: "uuid", icon: "🆔", name: "UUID 生成器", html: `
            <div class="flex-row"><span>生成数量</span><input type="number" id="uuidCount" value="1" min="1" max="10"><button id="genUuid">生成 UUID</button></div>
            <div class="result" id="uuidResult">点击生成</div>
        `, init: initUuidTool },
        // 趣味娱乐类（5个）
        { id: "dice", icon: "🎲", name: "掷骰子", html: `
            <div class="flex-row"><span>骰子类型</span><select id="diceType"><option value="4">d4</option><option value="6" selected>d6</option><option value="8">d8</option><option value="10">d10</option><option value="12">d12</option><option value="20">d20</option></select><button id="rollDice">掷骰</button></div>
            <div class="result" id="diceResult">结果: --</div>
        `, init: initDice },
        { id: "coin", icon: "🪙", name: "抛硬币", html: `
            <button id="flipCoin">抛硬币</button>
            <div class="result" id="coinResult" style="text-align: center; font-size: 2rem;">--</div>
        `, init: initCoin },
        { id: "lottery", icon: "🎟️", name: "抽签/抽奖", html: `
            <div class="flex-row"><span>自定义选项（用逗号分隔）</span><input type="text" id="lotteryItems" placeholder="奖1,奖2,谢谢参与" value="一等奖,二等奖,三等奖,安慰奖"></div>
            <button id="drawLottery">抽签</button>
            <div class="result" id="lotteryResult">点击抽签</div>
        `, init: initLottery },
        { id: "guessNumber", icon: "🔢", name: "猜数字游戏", html: `
            <div class="result" id="guessStatus">系统已生成 1-100 之间的数字，猜猜看！</div>
            <div class="flex-row"><input type="number" id="guessInput" placeholder="输入你的猜测"><button id="submitGuess">猜</button><button id="resetGuess">新游戏</button></div>
            <div class="result" id="guessHistory">猜测历史：无</div>
        `, init: initGuessNumber },
        { id: "typingTest", icon: "⌨️", name: "打字速度测试", html: `
            <div class="result" id="typingText" style="font-family: monospace; background: var(--bg);">The quick brown fox jumps over the lazy dog. 这是打字测试样例，请正确输入下面的文字。</div>
            <textarea id="typingInput" rows="3" placeholder="在这里打字..." disabled></textarea>
            <div class="flex-row"><button id="startTyping">开始测试</button><button id="resetTyping">重置</button></div>
            <div class="result" id="typingResult">未开始</div>
        `, init: initTypingTest }
    ];

    // 生成卡片
    const grid = document.getElementById('toolsGrid');
    toolsData.forEach(tool => {
        const card = document.createElement('div');
        card.className = 'tool-card';
        card.id = `tool-${tool.id}`;

    function initCalculator() { /* 原有代码，省略保持简洁，实际应保留完整实现 */ 
        const input = document.getElementById('calcInput');
        const resultDiv = document.getElementById('calcResult');
        const modeSelect = document.getElementById('calcMode');
        const buttonsContainer = document.getElementById('calcButtons');
        let currentMode = 'basic';
        const updateButtons = () => {
            const mode = modeSelect.value;
            currentMode = mode;
            let btns = mode === 'basic' ? 
                ['7','8','9','/','C','4','5','6','*','(', '1','2','3','-',')', '0','.','=','+','⌫'] :
                ['sin','cos','tan','√','^','7','8','9','/','C','4','5','6','*','(', '1','2','3','-',')', '0','.','=','+','⌫', 'π','e','log','ln','!'];
            buttonsContainer.innerHTML = '';
            btns.forEach(btn => {
                const btnEl = document.createElement('button');
                btnEl.textContent = btn;
                btnEl.onclick = () => handleButton(btn);
                buttonsContainer.appendChild(btnEl);
            });
        };
        const handleButton = (btn) => {
            if (btn === 'C') { input.value = ''; resultDiv.innerHTML = '结果: '; return; }
            if (btn === '⌫') { input.value = input.value.slice(0, -1); return; }
            if (btn === '=') { evaluate(); return; }
            if (currentMode === 'sci') {
                if (btn === 'sin') input.value += 'sin(';
                else if (btn === 'cos') input.value += 'cos(';
                else if (btn === 'tan') input.value += 'tan(';
                else if (btn === '√') input.value += 'sqrt(';
                else if (btn === '^') input.value += '^';
                else if (btn === 'π') input.value += 'PI';
                else if (btn === 'e') input.value += 'E';
                else if (btn === 'log') input.value += 'log10(';
                else if (btn === 'ln') input.value += 'ln(';
                else if (btn === '!') input.value += '!';
                else input.value += btn;
            } else input.value += btn;
        };
        const evaluate = () => {
            let expr = input.value;
            if (expr === '') { resultDiv.innerHTML = '结果: 请输入表达式'; return; }
            try {
                expr = expr.replace(/sin\(/g, 'Math.sin(').replace(/cos\(/g, 'Math.cos(').replace(/tan\(/g, 'Math.tan(');
                expr = expr.replace(/sqrt\(/g, 'Math.sqrt(').replace(/log10\(/g, 'Math.log10(').replace(/ln\(/g, 'Math.log(');
                expr = expr.replace(/\^/g, '**').replace(/PI/g, 'Math.PI').replace(/E/g, 'Math.E');
                expr = expr.replace(/(\d+)!/g, (_, n) => { let num = parseInt(n); let res = 1; for (let i=2;i<=num;i++) res*=i; return res; });
                const result = Function('"use strict";return (' + expr + ')')();
                resultDiv.innerHTML = `结果: ${result}`;
            } catch(e) { resultDiv.innerHTML = '结果: 表达式错误'; }
        };
        modeSelect.addEventListener('change', updateButtons);
        updateButtons();
        document.getElementById('calcBtn').onclick = evaluate;
        document.getElementById('clearCalc').onclick = () => { input.value = ''; resultDiv.innerHTML = '结果: '; };
        document.getElementById('backspaceCalc').onclick = () => { input.value = input.value.slice(0, -1); };
        input.addEventListener('keypress', (e) => { if (e.key === 'Enter') evaluate(); });
    }

    // 增强的访客信息函数（显示更多内容，支持刷新）
    function initVisitorInfo() {
        const infoDiv = document.getElementById('visitorInfoContent');
        if (!infoDiv) return;
        
        // 获取设备信息（不涉及网络）
        function getDeviceInfo() {
            const ua = navigator.userAgent;
            let browser = '未知', os = '未知';
            if (ua.includes('Chrome')) browser = 'Chrome';
            else if (ua.includes('Firefox')) browser = 'Firefox';
            else if (ua.includes('Safari')) browser = 'Safari';
            else if (ua.includes('Edge')) browser = 'Edge';
            else if (ua.includes('MSIE') || ua.includes('Trident')) browser = 'IE';
            
            if (ua.includes('Windows')) os = 'Windows';
            else if (ua.includes('Mac')) os = 'macOS';
            else if (ua.includes('Linux')) os = 'Linux';
            else if (ua.includes('Android')) os = 'Android';
            else if (ua.includes('iOS') || ua.includes('iPhone') || ua.includes('iPad')) os = 'iOS';
            
            const screen = `${window.screen.width} x ${window.screen.height}`;
            const language = navigator.language || '未知';
            return { browser, os, screen, language };
        }
        
        async function fetchAndDisplay() {
            infoDiv.innerHTML = '正在获取网络信息...';
            try {
                const geoResponse = await fetch('https://ipapi.co/json/');
                if (!geoResponse.ok) throw new Error(`HTTP ${geoResponse.status}`);
                const geoData = await geoResponse.json();
                
                if (geoData && geoData.ip) {
                    const fullIp = geoData.ip;
                    let partialIp = fullIp.includes('.') 
                        ? fullIp.split('.').slice(0,2).join('.') + '.***.***' 
                        : (fullIp.includes(':') ? fullIp.split(':').slice(0,2).join(':') + ':****:****:****:****' : fullIp);
                    
                    const city = geoData.city || '未知';
                    const region = geoData.region || '未知';
                    const country = geoData.country_name || '未知';
                    const postal = geoData.postal || '未知';
                    const lat = geoData.latitude || '?';
                    const lon = geoData.longitude || '?';
                    const isp = geoData.org || '未知运营商';
                    const timezone = geoData.timezone || '未知';
                    const utcOffset = geoData.utc_offset || '未知';
                    const device = getDeviceInfo();
                    
                    infoDiv.innerHTML = `
                        <div><strong>📡 网络信息</strong></div>
                        <div> 🔹 部分 IP：${partialIp}</div>
                        <div> 🔹 运营商：${isp}</div>
                        <div><strong>📍 地理位置</strong></div>
                        <div> 🔹 ${city}，${region}，${country}</div>
                        <div> 🔹 邮政编码：${postal}</div>
                        <div> 🔹 坐标：${lat}, ${lon}</div>
                        <div><strong>⏰ 时区信息</strong></div>
                        <div> 🔹 时区：${timezone}</div>
                        <div> 🔹 UTC 偏移：${utcOffset}</div>
                        <div><strong>💻 设备信息</strong></div>
                        <div> 🔹 浏览器：${device.browser}</div>
                        <div> 🔹 操作系统：${device.os}</div>
                        <div> 🔹 屏幕分辨率：${device.screen}</div>
                        <div> 🔹 语言：${device.language}</div>
                        <div style="font-size:0.7rem; margin-top:6px;">ℹ️ 数据来自 ipapi.co 和本地浏览器，仅作展示，未经存储。</div>
                    `;
                } else {
                    infoDiv.innerHTML = '⚠️ 未能获取访问信息，请稍后重试。';
                }
            } catch (error) {
                console.error('访客信息获取失败:', error);
                infoDiv.innerHTML = '⚠️ 获取失败，可能是网络问题或 API 限制。请点击刷新按钮重试。';
            }
        }
        
        fetchAndDisplay();
        const refreshBtn = document.getElementById('refreshVisitorInfo');
        if (refreshBtn) refreshBtn.addEventListener('click', (e) => { e.preventDefault(); fetchAndDisplay(); });
    }

    }
    function initJsonTool() {
        const inp=document.getElementById('jsonInput'), res=document.getElementById('jsonResult'); document.getElementById('formatJson').onclick=()=>{ try{ const obj=JSON.parse(inp.value); res.innerText=JSON.stringify(obj,null,2); }catch(e){ res.innerText='JSON 格式错误: '+e.message; } }; document.getElementById('validateJson').onclick=()=>{ try{ JSON.parse(inp.value); res.innerText='✅ JSON 格式正确'; }catch(e){ res.innerText='❌ 错误: '+e.message; } }; document.getElementById('minifyJson').onclick=()=>{ try{ const obj=JSON.parse(inp.value); res.innerText=JSON.stringify(obj); }catch(e){ res.innerText='无法压缩: '+e.message; } };
    }
    function initBase64Tool() {
        const inp=document.getElementById('base64Input'), res=document.getElementById('base64Result'); document.getElementById('encodeBase64').onclick=()=>{ try{ const encoded=btoa(unescape(encodeURIComponent(inp.value))); res.innerText=encoded; }catch(e){ res.innerText='编码失败: '+e.message; } }; document.getElementById('decodeBase64').onclick=()=>{ try{ const decoded=decodeURIComponent(escape(atob(inp.value))); res.innerText=decoded; }catch(e){ res.innerText='解码失败: 无效的 Base64 字符串'; } };
    }
    function initUuidTool() {
        const gen=()=>{ return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g,c=>{ const r=Math.random()*16|0; const v=c==='x'?r:(r&0x3|0x8); return v.toString(16); }); }; const btn=document.getElementById('genUuid'); btn.onclick=()=>{ let cnt=parseInt(document.getElementById('uuidCount').value)||1; if(cnt<1) cnt=1; if(cnt>10) cnt=10; const uuids=[]; for(let i=0;i<cnt;i++) uuids.push(gen()); document.getElementById('uuidResult').innerText=uuids.join('\n'); };
    }
    // 趣味工具
    function initDice() { const btn=document.getElementById('rollDice'); btn.onclick=()=>{ const type=parseInt(document.getElementById('diceType').value); const result=Math.floor(Math.random()*type)+1; document.getElementById('diceResult').innerText=`结果: ${result} (d${type})`; }; }
    function initCoin() { const btn=document.getElementById('flipCoin'); btn.onclick=()=>{ const result=Math.random()<0.5?'正面':'反面'; const emoji=result==='正面'?'🪙 正面':'💰 反面'; document.getElementById('coinResult').innerHTML=`${emoji}<br>${result}`; }; }
    function initLottery() { const btn=document.getElementById('drawLottery'); btn.onclick=()=>{ let itemsStr=document.getElementById('lotteryItems').value; if(!itemsStr.trim()) itemsStr='一等奖,二等奖,三等奖,谢谢参与'; const items=itemsStr.split(',').map(s=>s.trim()); if(items.length===0){ document.getElementById('lotteryResult').innerText='请至少输入一个选项'; return; } const randomIndex=Math.floor(Math.random()*items.length); const result=items[randomIndex]; document.getElementById('lotteryResult').innerHTML=`🎉 抽中：${result} 🎉`; }; }
    function initGuessNumber() {
        let secret=Math.floor(Math.random()*100)+1; let history=[];
        const statusDiv=document.getElementById('guessStatus'); const historyDiv=document.getElementById('guessHistory'); const guessInput=document.getElementById('guessInput'); const submitBtn=document.getElementById('submitGuess'); const resetBtn=document.getElementById('resetGuess');
        const updateHistory=()=>{ historyDiv.innerHTML=`猜测历史：${history.join(', ')||'无'}`; };
        const resetGame=()=>{ secret=Math.floor(Math.random()*100)+1; history=[]; updateHistory(); statusDiv.innerHTML='系统已生成 1-100 之间的数字，猜猜看！'; guessInput.value=''; };
        submitBtn.onclick=()=>{ const guess=parseInt(guessInput.value); if(isNaN(guess)||guess<1||guess>100){ statusDiv.innerHTML='请输入 1-100 之间的整数'; return; } history.push(guess); updateHistory(); if(guess===secret){ statusDiv.innerHTML=`🎉 恭喜！猜对了！数字就是 ${secret} 🎉`; resetGame(); }else if(guess<secret) statusDiv.innerHTML='📈 太小了，再试试！'; else statusDiv.innerHTML='📉 太大了，再试试！'; guessInput.value=''; };
        resetBtn.onclick=resetGame;
    }
    function initTypingTest() {
        const sampleText = "The quick brown fox jumps over the lazy dog. 这是打字测试样例，请正确输入下面的文字。";
        const textDiv = document.getElementById('typingText');
        const inputArea = document.getElementById('typingInput');
        const startBtn = document.getElementById('startTyping');
        const resetBtn = document.getElementById('resetTyping');
        const resultDiv = document.getElementById('typingResult');
        let startTime = null, timerInterval = null;
        const resetTest = () => { inputArea.disabled = true; inputArea.value = ''; resultDiv.innerHTML = '未开始'; if(timerInterval) clearInterval(timerInterval); startTime = null; textDiv.innerHTML = sampleText; };
        const startTest = () => { resetTest(); inputArea.disabled = false; inputArea.value = ''; inputArea.focus(); startTime = Date.now(); timerInterval = setInterval(() => { if(startTime){ const elapsed = ((Date.now()-startTime)/1000).toFixed(1); resultDiv.innerHTML = `⏱️ 正在输入... ${elapsed} 秒`; } }, 200); };
        const finishTest = () => { if(!startTime) return; const endTime = Date.now(); const elapsed = (endTime - startTime) / 1000; const userText = inputArea.value; if(userText === sampleText){ const wpm = (sampleText.split(/\s+/).length / elapsed) * 60; resultDiv.innerHTML = `✅ 完美！ 用时 ${elapsed.toFixed(1)} 秒，速度 ${Math.round(wpm)} WPM`; } else { resultDiv.innerHTML = `❌ 输入不匹配。 用时 ${elapsed.toFixed(1)} 秒，请重试。`; } if(timerInterval) clearInterval(timerInterval); startTime = null; inputArea.disabled = true; };
        startBtn.onclick = startTest;
        resetBtn.onclick = resetTest;
        inputArea.addEventListener('blur', () => { if(startTime) finishTest(); });
        inputArea.addEventListener('keypress', (e) => { if(e.key === 'Enter') { e.preventDefault(); finishTest(); } });
        resetTest();
    }

    // 执行所有初始化
    initCalculator();
    initPassword();
    initVisitorInfo();
    initTodo();
    initTemp();
    initQuote();
    initCounter();
    initCountdown();
    initTextStats();
    initColorTool();
    initLength();
    initMarkdown();
    initRandomNum();
    initBMI();
    initWeight();
    initBase();
    initStopwatch();
    initAge();
    initCase();
    initUnitConverter();
    initMortgage();
    initDateCalc();
    initJsonTool();
    initBase64Tool();
    initUuidTool();
    initDice();
    initCoin();
    initLottery();
    initGuessNumber();
    initTypingTest();

    // 深色模式
    const themeBtn = document.getElementById('themeToggle');
    const rootBody = document.body;
    if (localStorage.getItem('toolsTheme') === 'dark') {
        rootBody.classList.add('dark');
        themeBtn.innerText = '☀️ 浅色模式';
    }
    themeBtn.addEventListener('click', () => {
        rootBody.classList.toggle('dark');
        const isDark = rootBody.classList.contains('dark');
        localStorage.setItem('toolsTheme', isDark ? 'dark' : 'light');
        themeBtn.innerText = isDark ? '☀️ 浅色模式' : '🌙 深色模式';
    });
</script>
</body>
</html>
