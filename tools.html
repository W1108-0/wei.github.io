    <script>

                document.documentElement.classList.remove('dark');

    function initCalculator() {
        const input = document.getElementById('calcInput');
        const resultDiv = document.getElementById('calcResult');
        const modeSelect = document.getElementById('calcMode');
        const buttonsContainer = document.getElementById('calcButtons');
        let currentMode = 'basic';
        const updateButtons = () => {
            const mode = modeSelect.value;
            currentMode = mode;
            let btns = mode === 'basic' ? 
                ['7','8','9','/','C','4','5','6','*','(', '1','2','3','-',')', '0','.','=','+','вҢ«'] :
                ['sin','cos','tan','вҲҡ','^','7','8','9','/','C','4','5','6','*','(', '1','2','3','-',')', '0','.','=','+','вҢ«', 'ПҖ','e','log','ln','!'];
            buttonsContainer.innerHTML = '';
            btns.forEach(btn => {
                const btnEl = document.createElement('button');
                btnEl.textContent = btn;
                btnEl.onclick = () => handleButton(btn);
                buttonsContainer.appendChild(btnEl);
            });
        };
        const handleButton = (btn) => {
            if (btn === 'C') { input.value = ''; resultDiv.innerHTML = 'з»“жһң: '; return; }
            if (btn === 'вҢ«') { input.value = input.value.slice(0, -1); return; }
            if (btn === '=') { evaluate(); return; }
            if (currentMode === 'sci') {
                if (btn === 'sin') input.value += 'sin(';
                else if (btn === 'cos') input.value += 'cos(';
                else if (btn === 'tan') input.value += 'tan(';
                else if (btn === 'вҲҡ') input.value += 'sqrt(';
                else if (btn === '^') input.value += '^';
                else if (btn === 'ПҖ') input.value += 'PI';
                else if (btn === 'e') input.value += 'E';
                else if (btn === 'log') input.value += 'log10(';
                else if (btn === 'ln') input.value += 'ln(';
                else if (btn === '!') input.value += '!';
                else input.value += btn;
            } else input.value += btn;
        };
        const evaluate = () => {
            let expr = input.value;
            if (expr === '') { resultDiv.innerHTML = 'з»“жһң: иҜ·иҫ“е…ҘиЎЁиҫҫејҸ'; return; }
            try {
                expr = expr.replace(/sin\(/g, 'Math.sin(').replace(/cos\(/g, 'Math.cos(').replace(/tan\(/g, 'Math.tan(');
                expr = expr.replace(/sqrt\(/g, 'Math.sqrt(').replace(/log10\(/g, 'Math.log10(').replace(/ln\(/g, 'Math.log(');
                expr = expr.replace(/\^/g, '**').replace(/PI/g, 'Math.PI').replace(/E/g, 'Math.E');
                expr = expr.replace(/(\d+)!/g, (_, n) => { let num = parseInt(n); let res = 1; for (let i=2;i<=num;i++) res*=i; return res; });
                const result = Function('"use strict";return (' + expr + ')')();
                resultDiv.innerHTML = `з»“жһң: ${result}`;
            } catch(e) { resultDiv.innerHTML = 'з»“жһң: иЎЁиҫҫејҸй”ҷиҜҜ'; }
        };
        modeSelect.addEventListener('change', updateButtons);
        updateButtons();
        document.getElementById('calcBtn').onclick = evaluate;
        document.getElementById('clearCalc').onclick = () => { input.value = ''; resultDiv.innerHTML = 'з»“жһң: '; };
        document.getElementById('backspaceCalc').onclick = () => { input.value = input.value.slice(0, -1); };
        input.addEventListener('keypress', (e) => { if (e.key === 'Enter') evaluate(); });
    }
    function initPassword() {
        const genBtn = document.getElementById('genPassword');
        const copyBtn = document.getElementById('copyPassword');
        const resultSpan = document.getElementById('passwordResult');
        const generate = () => {
            const len = parseInt(document.getElementById('pwdLength').value) || 12;
            const upper = document.getElementById('pwdUpper').checked;
            const lower = document.getElementById('pwdLower').checked;
            const digits = document.getElementById('pwdDigits').checked;
            const symbols = document.getElementById('pwdSymbols').checked;
            let chars = '';
            if (upper) chars += 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
            if (lower) chars += 'abcdefghijklmnopqrstuvwxyz';
            if (digits) chars += '0123456789';
            if (symbols) chars += '!@#$%^&*()_+[]{}<>?';
            if (chars === '') { resultSpan.innerText = 'иҜ·иҮіе°‘йҖүжӢ©дёҖз§Қеӯ—з¬Ұзұ»еһӢ'; return; }
            let pwd = '';
            for (let i=0; i<len; i++) pwd += chars[Math.floor(Math.random() * chars.length)];
            resultSpan.innerText = pwd;
        };
        genBtn.onclick = generate;
        copyBtn.onclick = () => { const pwd = resultSpan.innerText; if (pwd && pwd !== 'иҜ·иҮіе°‘йҖүжӢ©дёҖз§Қеӯ—з¬Ұзұ»еһӢ') { navigator.clipboard.writeText(pwd); alert('еҜҶз Ғе·ІеӨҚеҲ¶еҲ°еүӘиҙҙжқҝ'); } };
        generate();
    }
    function initVisitorInfo() {
        const infoDiv = document.getElementById('visitorInfoContent');
        if (!infoDiv) return;
        function getDeviceInfo() {
            const ua = navigator.userAgent;
            let browser = 'жңӘзҹҘ', os = 'жңӘзҹҘ';
            if (ua.includes('Chrome')) browser = 'Chrome';
            else if (ua.includes('Firefox')) browser = 'Firefox';
            else if (ua.includes('Safari')) browser = 'Safari';
            else if (ua.includes('Edge')) browser = 'Edge';
            else if (ua.includes('MSIE') || ua.includes('Trident')) browser = 'IE';
            if (ua.includes('Windows')) os = 'Windows';
            else if (ua.includes('Mac')) os = 'macOS';
            else if (ua.includes('Linux')) os = 'Linux';
            else if (ua.includes('Android')) os = 'Android';
            else if (ua.includes('iOS') || ua.includes('iPhone') || ua.includes('iPad')) os = 'iOS';
            const screen = `${window.screen.width} x ${window.screen.height}`;
            const language = navigator.language || 'жңӘзҹҘ';
            return { browser, os, screen, language };
        }
        async function fetchAndDisplay() {
            infoDiv.innerHTML = 'жӯЈеңЁиҺ·еҸ–зҪ‘з»ңдҝЎжҒҜ...';
            try {
                const geoResponse = await fetch('https://ipapi.co/json/');
                if (!geoResponse.ok) throw new Error(`HTTP ${geoResponse.status}`);
                const geoData = await geoResponse.json();
                if (geoData && geoData.ip) {
                    const fullIp = geoData.ip;
                    let partialIp = fullIp.includes('.') ? fullIp.split('.').slice(0,2).join('.') + '.***.***' : (fullIp.includes(':') ? fullIp.split(':').slice(0,2).join(':') + ':****:****:****:****' : fullIp);
                    const city = geoData.city || 'жңӘзҹҘ';
                    const region = geoData.region || 'жңӘзҹҘ';
                    const country = geoData.country_name || 'жңӘзҹҘ';
                    const postal = geoData.postal || 'жңӘзҹҘ';
                    const lat = geoData.latitude || '?';
                    const lon = geoData.longitude || '?';
                    const isp = geoData.org || 'жңӘзҹҘиҝҗиҗҘе•Ҷ';
                    const timezone = geoData.timezone || 'жңӘзҹҘ';
                    const utcOffset = geoData.utc_offset || 'жңӘзҹҘ';
                    const device = getDeviceInfo();
                    infoDiv.innerHTML = `
                        <div><strong>рҹ“Ў зҪ‘з»ңдҝЎжҒҜ</strong></div>
                        <div>вҖғрҹ”№ йғЁеҲҶ IPпјҡ${partialIp}</div>
                        <div>вҖғрҹ”№ иҝҗиҗҘе•Ҷпјҡ${isp}</div>
                        <div><strong>рҹ“Қ ең°зҗҶдҪҚзҪ®</strong></div>
                        <div>вҖғрҹ”№ ${city}пјҢ${region}пјҢ${country}</div>
                        <div>вҖғрҹ”№ йӮ®ж”ҝзј–з Ғпјҡ${postal}</div>
                        <div>вҖғрҹ”№ еқҗж Үпјҡ${lat}, ${lon}</div>
                        <div><strong>вҸ° ж—¶еҢәдҝЎжҒҜ</strong></div>
                        <div>вҖғрҹ”№ ж—¶еҢәпјҡ${timezone}</div>
                        <div>вҖғрҹ”№ UTC еҒҸз§»пјҡ${utcOffset}</div>
                        <div><strong>рҹ’» и®ҫеӨҮдҝЎжҒҜ</strong></div>
                        <div>вҖғрҹ”№ жөҸи§ҲеҷЁпјҡ${device.browser}</div>
                        <div>вҖғрҹ”№ ж“ҚдҪңзі»з»ҹпјҡ${device.os}</div>
                        <div>вҖғрҹ”№ еұҸе№•еҲҶиҫЁзҺҮпјҡ${device.screen}</div>
                        <div>вҖғрҹ”№ иҜӯиЁҖпјҡ${device.language}</div>
                        <div style="font-size:0.7rem; margin-top:6px;">в„№пёҸ ж•°жҚ®жқҘиҮӘ ipapi.co е’Ңжң¬ең°жөҸи§ҲеҷЁпјҢд»…дҪңеұ•зӨәпјҢжңӘз»ҸеӯҳеӮЁгҖӮ</div>
                    `;
                } else {
                    infoDiv.innerHTML = 'вҡ пёҸ жңӘиғҪиҺ·еҸ–и®ҝй—®дҝЎжҒҜпјҢиҜ·зЁҚеҗҺйҮҚиҜ•гҖӮ';
                }
            } catch (error) {
                infoDiv.innerHTML = 'вҡ пёҸ иҺ·еҸ–еӨұиҙҘпјҢеҸҜиғҪжҳҜзҪ‘з»ңй—®йўҳжҲ– API йҷҗеҲ¶гҖӮиҜ·зӮ№еҮ»еҲ·ж–°жҢүй’®йҮҚиҜ•гҖӮ';
            }
        }
        fetchAndDisplay();

        if (refreshBtn) refreshBtn.addEventListener('click', (e) => { e.preventDefault(); fetchAndDisplay(); });

    // дјҳеҢ–еҖ’и®Ўж—¶еҷЁпјҡеҚ•дҪҚж”ҜжҢҒгҖҒжҢүй’®зҠ¶жҖҒз®ЎзҗҶ
    function initCountdown() {
        let interval = null;
        let remainingSeconds = 0;
        const valueInput = document.getElementById('countdownValue');
        const unitSelect = document.getElementById('countdownUnit');
        const display = document.getElementById('countdownDisplay');
        const startBtn = document.getElementById('startCountdown');
        const pauseBtn = document.getElementById('pauseCountdown');
        const resumeBtn = document.getElementById('resumeCountdown');
        const stopBtn = document.getElementById('stopCountdown');
        
        function toSeconds() {
            let val = parseFloat(valueInput.value);
            if (isNaN(val)) val = 0;
            const unit = unitSelect.value;
            if (unit === 'minutes') val *= 60;
            else if (unit === 'hours') val *= 3600;
            return Math.floor(val);
        }
        
        function updateDisplay() {
            display.innerText = `еү©дҪҷ: ${remainingSeconds} з§’`;
        }
        
        function resetButtonsState(started, paused) {
            // started: еҖ’и®Ўж—¶жҳҜеҗҰжӯЈеңЁиҝҗиЎҢпјҲintervalеӯҳеңЁдё”жңӘжҡӮеҒңпјү
            // еҪ“жңӘејҖе§ӢжҲ–е·ІеҒңжӯўж—¶пјҢејҖе§ӢжҢүй’®еҸҜз”ЁпјҢжҡӮеҒң/з»§з»ӯ/еҒңжӯўдёҚеҸҜз”Ё
            if (!started) {
                startBtn.disabled = false;
                pauseBtn.disabled = true;
                resumeBtn.disabled = true;
                stopBtn.disabled = true;
            } else {
                // е·ІејҖе§ӢпјҢдҪҶеҸҜиғҪжҡӮеҒңжҲ–иҝҗиЎҢ
                if (paused) {
                    startBtn.disabled = true;
                    pauseBtn.disabled = true;
                    resumeBtn.disabled = false;
                    stopBtn.disabled = false;
                } else {
                    startBtn.disabled = true;
                    pauseBtn.disabled = false;
                    resumeBtn.disabled = true;
                    stopBtn.disabled = false;
                }
            }
        }
        
        function start() {
            if (interval) clearInterval(interval);
            let total = toSeconds();
            if (total <= 0) {
                display.innerText = 'иҜ·и®ҫзҪ®жӯЈж•°ж—¶й—ҙ';
                return;
            }
            remainingSeconds = total;
            updateDisplay();
            interval = setInterval(() => {
                if (remainingSeconds <= 1) {
                    clearInterval(interval);
                    interval = null;
                    display.innerText = 'вҸ° ж—¶й—ҙеҲ°!';
                    resetButtonsState(false, false);
                } else {
                    remainingSeconds--;
                    updateDisplay();
                }
            }, 1000);
            resetButtonsState(true, false);
        }
        
        function pause() {
            if (interval) {
                clearInterval(interval);
                interval = null;
                resetButtonsState(true, true);
            }
        }
        
        function resume() {
            if (interval) return;
            if (remainingSeconds <= 0) return;
            interval = setInterval(() => {
                if (remainingSeconds <= 1) {
                    clearInterval(interval);
                    interval = null;
                    display.innerText = 'вҸ° ж—¶й—ҙеҲ°!';
                    resetButtonsState(false, false);
                } else {
                    remainingSeconds--;
                    updateDisplay();
                }
            }, 1000);
            resetButtonsState(true, false);
        }
        
        function stop() {
            if (interval) clearInterval(interval);
            interval = null;
            remainingSeconds = 0;
            updateDisplay();
            resetButtonsState(false, false);
        }
        
        startBtn.onclick = start;
        pauseBtn.onclick = pause;
        resumeBtn.onclick = resume;
        stopBtn.onclick = stop;
        resetButtonsState(false, false);
    }

    function initRandomNum() {

        if (btn) btn.onclick = () => {
            let min = parseInt(document.getElementById('randMin').value) || 1;
            let max = parseInt(document.getElementById('randMax').value) || 100;
            let count = parseInt(document.getElementById('randCount').value) || 1;
            if (min > max) [min, max] = [max, min];
            const totalNumbers = max - min + 1;
            if (count > totalNumbers) {
                document.getElementById('randomResult').innerText = `й”ҷиҜҜпјҡжңҖеӨҡеҸӘиғҪз”ҹжҲҗ ${totalNumbers} дёӘдёҚйҮҚеӨҚж•°еӯ—`;
                return;
            }
            // з”ҹжҲҗдёҚйҮҚеӨҚйҡҸжңәж•°
            const numbers = new Set();
            while (numbers.size < count) {
                const rand = Math.floor(Math.random() * (max - min + 1) + min);
                numbers.add(rand);
            }
            const result = Array.from(numbers).join(', ');
            document.getElementById('randomResult').innerHTML = `з»“жһң: ${result}`;
        };
        btn?.click();
    }

    function initStopwatch() {
        let swInterval = null, swTime = 0;
        const display = document.getElementById('stopwatchDisplay');
        const lapsDiv = document.getElementById('stopwatchLaps');
        let lapCount = 1;
        const startBtn = document.getElementById('stopwatchStart');
        const pauseBtn = document.getElementById('stopwatchPause');
        const resetBtn = document.getElementById('stopwatchReset');
        const lapBtn = document.getElementById('stopwatchLap');
        
        const update = () => { let m = Math.floor(swTime/6000), s = Math.floor((swTime%6000)/100), cs = swTime%100; display.innerText = `${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}.${cs.toString().padStart(2,'0')}`; };
        
        function setButtonsState(running) {
            // running: true иЎЁзӨәжӯЈеңЁи®Ўж—¶пјҲintervalеӯҳеңЁпјүпјҢfalseиЎЁзӨәеҒңжӯўжҲ–жҡӮеҒң
            if (running) {
                startBtn.disabled = true;
                pauseBtn.disabled = false;
                lapBtn.disabled = false;
            } else {
                startBtn.disabled = false;
                pauseBtn.disabled = true;
                lapBtn.disabled = true;
            }
            // еӨҚдҪҚжҢүй’®е§Ӣз»ҲеҸҜз”Ё
            resetBtn.disabled = false;
        }
        
        function start() {
            if (swInterval) return;
            swInterval = setInterval(() => { swTime++; update(); }, 10);
            setButtonsState(true);
        }
        function pause() {
            if (swInterval) clearInterval(swInterval);
            swInterval = null;
            setButtonsState(false);
        }
        function reset() {
            if (swInterval) clearInterval(swInterval);
            swInterval = null;
            swTime = 0;
            update();
            lapsDiv.innerHTML = 'и®Ўж¬Ўи®°еҪ•пјҡ';
            lapCount = 1;
            setButtonsState(false);
        }
        function lap() {
            if (swTime === 0 && lapsDiv.innerHTML === 'и®Ўж¬Ўи®°еҪ•пјҡ') return;
            const current = display.innerText;
            const lapItem = document.createElement('div');
            lapItem.textContent = `и®Ўж¬Ў ${lapCount++}: ${current}`;
            lapsDiv.appendChild(lapItem);
        }
        startBtn.onclick = start;
        pauseBtn.onclick = pause;
        resetBtn.onclick = reset;
        lapBtn.onclick = lap;
        setButtonsState(false);
        update();
    }

    }
    function initDateCalc() {
        const btn=document.getElementById('calcDateDiff'); btn.onclick=()=>{ let start=new Date(document.getElementById('dateStart').value); let end=new Date(document.getElementById('dateEnd').value); if(isNaN(start)||isNaN(end)){ document.getElementById('dateResult').innerText='иҜ·йҖүжӢ©жңүж•Ҳж—Ҙжңҹ'; return; } if(start>end)[start,end]=[end,start]; const exclude=document.getElementById('excludeWeekends').checked; let days=Math.round((end-start)/(1000*60*60*24)); let workDays=days; if(exclude){ let cur=new Date(start); workDays=0; while(cur<=end){ const d=cur.getDay(); if(d!==0 && d!==6) workDays++; cur.setDate(cur.getDate()+1); } } document.getElementById('dateResult').innerHTML=`зӣёе·® ${days} еӨ© (зәҰ ${(days/7).toFixed(1)} е‘Ё)<br>${exclude?`е·ҘдҪңж—Ҙ: ${workDays} еӨ©`:''}`; };
    }
    function initJsonTool() {
        const inp=document.getElementById('jsonInput'), res=document.getElementById('jsonResult'); document.getElementById('formatJson').onclick=()=>{ try{ const obj=JSON.parse(inp.value); res.innerText=JSON.stringify(obj,null,2); }catch(e){ res.innerText='JSON ж јејҸй”ҷиҜҜ: '+e.message; } }; document.getElementById('validateJson').onclick=()=>{ try{ JSON.parse(inp.value); res.innerText='вң… JSON ж јејҸжӯЈзЎ®'; }catch(e){ res.innerText='вқҢ й”ҷиҜҜ: '+e.message; } }; document.getElementById('minifyJson').onclick=()=>{ try{ const obj=JSON.parse(inp.value); res.innerText=JSON.stringify(obj); }catch(e){ res.innerText='ж— жі•еҺӢзј©: '+e.message; } };
    }
    function initBase64Tool() {
        const inp=document.getElementById('base64Input'), res=document.getElementById('base64Result'); document.getElementById('encodeBase64').onclick=()=>{ try{ const encoded=btoa(unescape(encodeURIComponent(inp.value))); res.innerText=encoded; }catch(e){ res.innerText='зј–з ҒеӨұиҙҘ: '+e.message; } }; document.getElementById('decodeBase64').onclick=()=>{ try{ const decoded=decodeURIComponent(escape(atob(inp.value))); res.innerText=decoded; }catch(e){ res.innerText='и§Јз ҒеӨұиҙҘ: ж— ж•Ҳзҡ„ Base64 еӯ—з¬ҰдёІ'; } };
    }
    function initUuidTool() {
        const gen=()=>{ return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g,c=>{ const r=Math.random()*16|0; const v=c==='x'?r:(r&0x3|0x8); return v.toString(16); }); }; const btn=document.getElementById('genUuid'); btn.onclick=()=>{ let cnt=parseInt(document.getElementById('uuidCount').value)||1; if(cnt<1) cnt=1; if(cnt>10) cnt=10; const uuids=[]; for(let i=0;i<cnt;i++) uuids.push(gen()); document.getElementById('uuidResult').innerText=uuids.join('\n'); };
    }
    function initDice() { const btn=document.getElementById('rollDice'); btn.onclick=()=>{ const type=parseInt(document.getElementById('diceType').value); const result=Math.floor(Math.random()*type)+1; document.getElementById('diceResult').innerText=`з»“жһң: ${result} (d${type})`; }; }
    function initCoin() { const btn=document.getElementById('flipCoin'); btn.onclick=()=>{ const result=Math.random()<0.5?'жӯЈйқў':'еҸҚйқў'; const emoji=result==='жӯЈйқў'?'рҹӘҷ жӯЈйқў':'рҹ’° еҸҚйқў'; document.getElementById('coinResult').innerHTML=`${emoji}<br>${result}`; }; }
    function initLottery() { const btn=document.getElementById('drawLottery'); btn.onclick=()=>{ let itemsStr=document.getElementById('lotteryItems').value; if(!itemsStr.trim()) itemsStr='дёҖзӯүеҘ–,дәҢзӯүеҘ–,дёүзӯүеҘ–,и°ўи°ўеҸӮдёҺ'; const items=itemsStr.split(',').map(s=>s.trim()); if(items.length===0){ document.getElementById('lotteryResult').innerText='иҜ·иҮіе°‘иҫ“е…ҘдёҖдёӘйҖүйЎ№'; return; } const randomIndex=Math.floor(Math.random()*items.length); const result=items[randomIndex]; document.getElementById('lotteryResult').innerHTML=`рҹҺү жҠҪдёӯпјҡ${result} рҹҺү`; }; }
    function initGuessNumber() {
        let secret=Math.floor(Math.random()*100)+1; let history=[];
        const statusDiv=document.getElementById('guessStatus'); const historyDiv=document.getElementById('guessHistory'); const guessInput=document.getElementById('guessInput'); const submitBtn=document.getElementById('submitGuess'); const resetBtn=document.getElementById('resetGuess');
        const updateHistory=()=>{ historyDiv.innerHTML=`зҢңжөӢеҺҶеҸІпјҡ${history.join(', ')||'ж— '}`; };
        const resetGame=()=>{ secret=Math.floor(Math.random()*100)+1; history=[]; updateHistory(); statusDiv.innerHTML='зі»з»ҹе·Із”ҹжҲҗ 1-100 д№Ӣй—ҙзҡ„ж•°еӯ—пјҢзҢңзҢңзңӢпјҒ'; guessInput.value=''; };
        submitBtn.onclick=()=>{ const guess=parseInt(guessInput.value); if(isNaN(guess)||guess<1||guess>100){ statusDiv.innerHTML='иҜ·иҫ“е…Ҙ 1-100 д№Ӣй—ҙзҡ„ж•ҙж•°'; return; } history.push(guess); updateHistory(); if(guess===secret){ statusDiv.innerHTML=`рҹҺү жҒӯе–ңпјҒзҢңеҜ№дәҶпјҒж•°еӯ—е°ұжҳҜ ${secret} рҹҺү`; resetGame(); }else if(guess<secret) statusDiv.innerHTML='рҹ“Ҳ еӨӘе°ҸдәҶпјҢеҶҚиҜ•иҜ•пјҒ'; else statusDiv.innerHTML='рҹ“ү еӨӘеӨ§дәҶпјҢеҶҚиҜ•иҜ•пјҒ'; guessInput.value=''; };
        resetBtn.onclick=resetGame;
    }
    function initTypingTest() {
        const sampleText = "The quick brown fox jumps over the lazy dog. иҝҷжҳҜжү“еӯ—жөӢиҜ•ж ·дҫӢпјҢиҜ·жӯЈзЎ®иҫ“е…ҘдёӢйқўзҡ„ж–Үеӯ—гҖӮ";
        const textDiv = document.getElementById('typingText');
        const inputArea = document.getElementById('typingInput');
        const startBtn = document.getElementById('startTyping');
        const resetBtn = document.getElementById('resetTyping');
        const resultDiv = document.getElementById('typingResult');
        let startTime = null, timerInterval = null;
        const resetTest = () => { inputArea.disabled = true; inputArea.value = ''; resultDiv.innerHTML = 'жңӘејҖе§Ӣ'; if(timerInterval) clearInterval(timerInterval); startTime = null; textDiv.innerHTML = sampleText; };
        const startTest = () => { resetTest(); inputArea.disabled = false; inputArea.value = ''; inputArea.focus(); startTime = Date.now(); timerInterval = setInterval(() => { if(startTime){ const elapsed = ((Date.now()-startTime)/1000).toFixed(1); resultDiv.innerHTML = `вҸұпёҸ жӯЈеңЁиҫ“е…Ҙ... ${elapsed} з§’`; } }, 200); };
        const finishTest = () => { if(!startTime) return; const endTime = Date.now(); const elapsed = (endTime - startTime) / 1000; const userText = inputArea.value; if(userText === sampleText){ const wpm = (sampleText.split(/\s+/).length / elapsed) * 60; resultDiv.innerHTML = `вң… е®ҢзҫҺпјҒ з”Ёж—¶ ${elapsed.toFixed(1)} з§’пјҢйҖҹеәҰ ${Math.round(wpm)} WPM`; } else { resultDiv.innerHTML = `вқҢ иҫ“е…ҘдёҚеҢ№й…ҚгҖӮ з”Ёж—¶ ${elapsed.toFixed(1)} з§’пјҢиҜ·йҮҚиҜ•гҖӮ`; } if(timerInterval) clearInterval(timerInterval); startTime = null; inputArea.disabled = true; };
        startBtn.onclick = startTest;
        resetBtn.onclick = resetTest;
        inputArea.addEventListener('blur', () => { if(startTime) finishTest(); });
        inputArea.addEventListener('keypress', (e) => { if(e.key === 'Enter') { e.preventDefault(); finishTest(); } });
        resetTest();
    }

    // жёІжҹ“е·Ҙе…·еҲ—иЎЁпјҲж”ҜжҢҒжҗңзҙўзӯӣйҖүпјү
    let currentFilter = '';
    function renderTools() {
        const container = document.getElementById('toolsList');
        if (!container) return;
        const filtered = toolsData.filter(tool => 
            tool.name.toLowerCase().includes(currentFilter.toLowerCase())
        );
        document.getElementById('toolsCount').innerText = `е…ұ ${filtered.length} дёӘе·Ҙе…· (жҖ»и®Ў ${toolsData.length})`;
        container.innerHTML = '';
        filtered.forEach(tool => {
            const card = document.createElement('div');
            card.className = 'tool-card';
            card.id = `tool-${tool.id}`;
            card.setAttribute('data-name', tool.name);
            card.innerHTML = `
                <div class="tool-header">
                    <div class="tool-title"><span class="tool-icon">${tool.icon}</span> ${tool.name}</div>
                    <span class="expand-icon">в–ј</span>
                </div>
                <div class="tool-content">
                    <div class="tool-body">${tool.html}</div>
                </div>
            `;
            container.appendChild(card);
            const header = card.querySelector('.tool-header');
            header.addEventListener('click', (e) => {
                e.stopPropagation();
                card.classList.toggle('expanded');
            });
            if (tool.init) tool.init();
        });
    }

    // жҗңзҙўжЎҶдәӨдә’
    const searchInput = document.getElementById('searchInput');
    const clearBtn = document.getElementById('clearSearchBtn');
    function filterTools() {
        currentFilter = searchInput.value;
        renderTools();
    }
    searchInput.addEventListener('input', filterTools);
    clearBtn.addEventListener('click', () => {
        searchInput.value = '';
        filterTools();
    });

    // ==================== ж·ұиүІжЁЎејҸз»ҹдёҖпјҲsiteTheme + и·Ёж ҮзӯҫйЎөеҗҢжӯҘпјү ====================
    const themeToggle = document.getElementById('themeToggle');
    function setTheme(isDark) {
        if (isDark) {
            document.documentElement.classList.add('dark');
            themeToggle.innerHTML = 'вҳҖпёҸ жө…иүІжЁЎејҸ';
        } else {
            document.documentElement.classList.remove('dark');
            themeToggle.innerHTML = 'рҹҢҷ ж·ұиүІжЁЎејҸ';
        }
        localStorage.setItem('siteTheme', isDark ? 'dark' : 'light');
    }
    // зӣ‘еҗ¬е…¶д»–ж ҮзӯҫйЎөзҡ„дё»йўҳеҸҳжӣҙпјҲи·Ёж ҮзӯҫйЎөеҗҢжӯҘпјү
    window.addEventListener('storage', (e) => {
        if (e.key === 'siteTheme') {
            const isDark = e.newValue === 'dark';
            if (isDark) {
                document.documentElement.classList.add('dark');
                themeToggle.innerHTML = 'вҳҖпёҸ жө…иүІжЁЎејҸ';
            } else {
                document.documentElement.classList.remove('dark');
                themeToggle.innerHTML = 'рҹҢҷ ж·ұиүІжЁЎејҸ';
            }
        }
    });
    // еҲқе§ӢеҢ–жҢүй’®ж–Үеӯ—пјҲеҗҢжӯҘеҪ“еүҚж №е…ғзҙ зұ»пјү
    if (document.documentElement.classList.contains('dark')) {
        themeToggle.innerHTML = 'вҳҖпёҸ жө…иүІжЁЎејҸ';
    } else {
        themeToggle.innerHTML = 'рҹҢҷ ж·ұиүІжЁЎејҸ';
    }
    themeToggle.addEventListener('click', () => {
        const isDark = document.documentElement.classList.contains('dark');
        setTheme(!isDark);
    });

    // еҲқе§ӢжёІжҹ“
    renderTools();
</script>
</body>
